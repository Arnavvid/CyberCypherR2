<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', monospace; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #333; }
        thead { background-color: #1a1a1a; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { color: #888; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        tr:nth-child(even) { background-color: #141414; }
        tr:hover { background-color: #1f1f1f; }
        
        .risk-high { color: #ff4444; font-weight: bold; }
        .risk-med { color: #ffbb33; font-weight: bold; }
        .risk-low { color: #00C851; font-weight: bold; }

        /* --- NEW CSS FOR BUTTONS AND STATUS --- */
        .btn-approve {
            background-color: #28a745; /* Green */
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Segoe UI', monospace;
            transition: background-color 0.2s;
        }
        .btn-approve:hover {
            background-color: #218838; /* Darker green */
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
        }
        .status-executed {
            background-color: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }
        .status-pending {
            background-color: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
    </style>
</head>
<body>
    <h1 style="border-bottom: 1px solid #333; padding-bottom: 10px;">AUTONOMOUS AGENT DECISIONS</h1>
    
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Reasoning</th>
                <th>Action</th>
                <th>Risk</th>
                <th>Status</th>
                <th>Controls</th>
            </tr>
        </thead>
        <tbody id="logTable"></tbody>
    </table>

    <script>
        async function fetchLogs() {
            const res = await fetch('/api/logs');
            const logs = await res.json();
            const tbody = document.getElementById('logTable');
            tbody.innerHTML = ''; 

            logs.forEach(log => {
                const row = document.createElement('tr');
                
                // Risk Coloring
                let riskClass = 'risk-low';
                if(log.risk > 40) riskClass = 'risk-med';
                if(log.risk > 70) riskClass = 'risk-high';

                // --- STATUS BADGE LOGIC ---
                let statusClass = log.status === 'Executed' ? 'status-executed' : 'status-pending';
                // Wrap status text in a styled span
                let statusBadge = `<span class="status-badge ${statusClass}">${log.status}</span>`;

                // --- APPROVE BUTTON LOGIC ---
                let actionButton = '';
                if (log.status === 'Pending Approval') {
                    // Added 'btn-approve' class
                    actionButton = `<button class="btn-approve" onclick="approve('${log.action}')">Approve</button>`;
                }

                row.innerHTML = `
                    <td style="color:#888">${log.timestamp}</td>
                    <td style="color:#ccc">${log.thought}</td>
                    <td style="font-weight:bold">${log.action}</td>
                    <td class="${riskClass}">${log.risk}%</td>
                    <td>${statusBadge}</td>
                    <td>${actionButton}</td>
                `;
                tbody.appendChild(row);
            });
        }

        async function approve(tool) {
            await fetch('/api/approve_action', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({tool: tool})
            });
            fetchLogs(); // Refresh immediately
        }

        setInterval(fetchLogs, 1000);
        fetchLogs();
    </script>
</body>
</html>
