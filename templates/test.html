<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <style>
        body { background-color: #000000; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center;}
        
        /* Dynamic Button Grid */
        .problem-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .problem-card {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: left;
        }

        .problem-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .problem-card:active { transform: scale(0.98); }

        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: block; }
        .card-desc { font-size: 13px; color: #aaa; margin-bottom: 15px; display: block; }
        
        /* Parameter Tags */
        .tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { 
            background: rgba(255,255,255,0.1); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            color: #ddd; 
            font-family: monospace;
        }

        /* Color Themes (applied dynamically) */
        .theme-red { border-color: #c0392b; }
        .theme-red .card-title { color: #e74c3c; }
        
        .theme-orange { border-color: #d35400; }
        .theme-orange .card-title { color: #e67e22; }
        
        .theme-purple { border-color: #8e44ad; }
        .theme-purple .card-title { color: #9b59b6; }

        #console-log { 
            background: #1a1a1a; padding: 20px; 
            margin-top: 40px; font-family: monospace; color: #00ff00; 
            white-space: pre-wrap; text-align: left; height: 250px; overflow-y: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1 style="border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left;">PROBLEM CREATOR</h1>

    <div id="problem-container" class="problem-grid">
        <p>Loading Scenarios...</p>
    </div>

    <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left;">System Logs</h3>
    <div id="console-log">System Ready.</div>

    <script>
        let pollInterval = null;
        let lastKnownLogTime = null;
        let lastKnownStatus = null;
        let retryMessagePrinted = false; // Prevents double printing

        async function loadProblems() {
            try {
                const res = await fetch('/api/problems');
                const catalog = await res.json();
                const container = document.getElementById('problem-container');
                container.innerHTML = ''; 

                for (const [id, data] of Object.entries(catalog)) {
                    let colorClass = 'theme-orange'; 
                    if (data.color.includes('red')) colorClass = 'theme-red';
                    if (data.color.includes('purple')) colorClass = 'theme-purple';

                    const tagsHtml = Object.keys(data.effects)
                        .map(effect => `<span class="tag">${effect}</span>`)
                        .join('');

                    const card = document.createElement('div');
                    card.className = `problem-card ${colorClass}`;
                    card.style.borderColor = data.color; 
                    card.innerHTML = `
                        <span class="card-title" style="color:${data.color}">${data.name}</span>
                        <span class="card-desc">${data.description}</span>
                        <div class="tags">${tagsHtml}</div>
                    `;
                    
                    card.onclick = () => runScenario(id, data.name);
                    container.appendChild(card);
                }

            } catch (e) {
                document.getElementById('problem-container').innerHTML = "Error loading problems.";
                console.error(e);
            }
        }

        async function runScenario(problemId, problemName) {
            const log = document.getElementById('console-log');
            
            // Stop any previous polling
            if (pollInterval) clearInterval(pollInterval);
            retryMessagePrinted = false; // Reset flag

            log.innerHTML += `<br><br> <span style="color:#ff5555; font-weight:bold;">> Injecting fault: ${problemName}...</span>`; 
            log.innerHTML += `<br> <span style="color:#ffff55;">> Gathering JSON Telemetry...</span>`;
            log.scrollTop = log.scrollHeight;
            
            try {
                const res = await fetch('/api/trigger_scenario', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({problem: problemId})
                });
                
                const data = await res.json();
                
                if (data.error) {
                    log.innerHTML += `\n[ERROR] ${data.error}`;
                }
                else {
                    log.innerHTML += `\n[AI DECISION] Tool: ${data.decision?.tool ?? 'N/A'}`;
                    log.innerHTML += `\n[AI REASONING] "${data.decision?.thought ?? 'N/A'}"`;
                    if (data.execution_result !== undefined) {
                        log.innerHTML += `\n[RESULT] ${data.execution_result}`;
                    }

                    // --- START FAST POLLING (500ms) ---
                    if (data.execution_result === "Awaiting admin approval") {
                        const logsRes = await fetch('/api/logs');
                        const logs = await logsRes.json();
                        if (logs.length > 0) {
                            lastKnownLogTime = logs[0].timestamp; 
                            lastKnownStatus = "Pending Approval";
                            pollInterval = setInterval(watchForUpdates, 500); // FASTER POLLING
                        }
                    }
                }
                log.scrollTop = log.scrollHeight;
                
            } catch (err) {
                log.innerHTML += `\n[FATAL] Connection Failed: ${err}`;
            }
        }

        async function watchForUpdates() {
            const log = document.getElementById('console-log');
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                
                if (logs.length === 0) return;

                const topLog = logs[0];

                // --- SCENARIO 1: The logs are the same, but status changed to Rejected ---
                // This catches the exact moment you click "Reject" before the retry finishes
                if (topLog.timestamp === lastKnownLogTime && topLog.status === 'Rejected' && !retryMessagePrinted) {
                    log.innerHTML += `<br> <span style="color:#ffff55;">> Model retrying...</span>`; 
                    retryMessagePrinted = true;
                    lastKnownStatus = 'Rejected';
                    log.scrollTop = log.scrollHeight;
                }

                // --- SCENARIO 2: A NEW log has appeared (The Retry Decision) ---
                else if (topLog.timestamp !== lastKnownLogTime) {
                    
                    // If we somehow missed the "Rejected" state update because it was too fast,
                    // check if the 2nd log is rejected.
                    if (logs.length > 1 && logs[1].status === 'Rejected' && !retryMessagePrinted) {
                        log.innerHTML += `<br> <span style="color:#ffff55;">> Model retrying...</span>`;
                        retryMessagePrinted = true;
                    }

                    // Print the NEW decision
                    log.innerHTML += `\n[AI RETRY] Tool: ${topLog.action}`;
                    log.innerHTML += `\n[AI REASONING] "${topLog.thought}"`;
                    log.innerHTML += `\n[RESULT] ${topLog.status === 'Executed' ? 'Executed successfully' : 'Awaiting admin approval'}`;
                    log.scrollTop = log.scrollHeight;

                    // Update trackers
                    lastKnownLogTime = topLog.timestamp;
                    lastKnownStatus = topLog.status;
                    retryMessagePrinted = false; // Reset for potential future retries

                    // If the retry succeeded, stop polling. If it's pending again, keep polling.
                    if (topLog.status === 'Executed') {
                        clearInterval(pollInterval);
                    }
                }

                // --- SCENARIO 3: Approved ---
                else if (topLog.status === 'Executed' && topLog.timestamp === lastKnownLogTime && lastKnownStatus === 'Pending Approval') {
                    log.innerHTML += `<br> <span style="color:#00ff00;">> Admin Approved. Action Executed.</span>`;
                    log.scrollTop = log.scrollHeight;
                    clearInterval(pollInterval);
                }

            } catch (e) {
                console.error("Polling error", e);
            }
        }
        
        loadProblems();
    </script>
</body>
</html>
