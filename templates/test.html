<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <style>
        body { background-color: #000000; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center;}
        
        /* Dynamic Button Grid */
        .problem-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .problem-card {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: left;
        }

        .problem-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .problem-card:active { transform: scale(0.98); }

        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: block; }
        .card-desc { font-size: 13px; color: #aaa; margin-bottom: 15px; display: block; }
        
        /* Parameter Tags */
        .tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { 
            background: rgba(255,255,255,0.1); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            color: #ddd; 
            font-family: monospace;
        }

        /* Color Themes (applied dynamically) */
        .theme-red { border-color: #c0392b; }
        .theme-red .card-title { color: #e74c3c; }
        
        .theme-orange { border-color: #d35400; }
        .theme-orange .card-title { color: #e67e22; }
        
        .theme-purple { border-color: #8e44ad; }
        .theme-purple .card-title { color: #9b59b6; }

        #console-log { 
            background: #1a1a1a; padding: 20px; 
            margin-top: 40px; font-family: monospace; color: #00ff00; 
            white-space: pre-wrap; text-align: left; height: 250px; overflow-y: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1 style="border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left;">PROBLEM CREATOR</h1>
    <div style="margin: 12px 0;">
        <button id="autoSimBtn" class="problem-card" style="display:inline-block; padding:8px 14px; border-radius:6px; cursor:pointer; background:#0b0b0b; border:1px solid #333; color:#fff; font-weight:bold;">
            Start Auto-Simulate
        </button>
        <span id="autoSimStatus" style="margin-left:12px; color:#aaa; font-family:monospace;">Idle</span>
    </div>
    <div id="problem-container" class="problem-grid">
        <p>Loading Scenarios...</p>
    </div>

    <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left;">System Logs</h3>
    <div id="console-log">System Ready.</div>

    <script>
        let pollInterval = null;
        let lastKnownLogTime = null;
        let lastKnownStatus = null;
        let retryMessagePrinted = false; // Prevents double printing

        async function loadProblems() {
            try {
                const res = await fetch('/api/problems');
                const catalog = await res.json();
                const container = document.getElementById('problem-container');
                container.innerHTML = ''; 

                for (const [id, data] of Object.entries(catalog)) {
                    let colorClass = 'theme-orange'; 
                    if (data.color.includes('red')) colorClass = 'theme-red';
                    if (data.color.includes('purple')) colorClass = 'theme-purple';

                    const tagsHtml = Object.keys(data.effects)
                        .map(effect => `<span class="tag">${effect}</span>`)
                        .join('');

                    const card = document.createElement('div');
                    card.className = `problem-card ${colorClass}`;
                    card.style.borderColor = data.color; 
                    card.innerHTML = `
                        <span class="card-title" style="color:${data.color}">${data.name}</span>
                        <span class="card-desc">${data.description}</span>
                        <div class="tags">${tagsHtml}</div>
                    `;
                    
                    card.onclick = () => runScenario(id, data.name);
                    container.appendChild(card);
                }

            } catch (e) {
                document.getElementById('problem-container').innerHTML = "Error loading problems.";
                console.error(e);
            }
        }

        async function runScenario(problemId, problemName) {
            const log = document.getElementById('console-log');
            
            if (pollInterval) clearInterval(pollInterval);
            retryMessagePrinted = false;
            log.innerHTML += `<br><br> <span style="color:#ff5555; font-weight:bold;">> Injecting fault: ${problemName}...</span>`; 
            log.innerHTML += `<br> <span style="color:#ffff55;">> Gathering JSON Telemetry...</span>`;
            log.scrollTop = log.scrollHeight;
            
            try {
                const res = await fetch('/api/trigger_scenario', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({problem: problemId})
                });
                
                const data = await res.json();
                
                if (data.error) {
                    log.innerHTML += `\n[ERROR] ${data.error}`;
                }
                else {
                    log.innerHTML += `\n[AI DECISION] Tool: ${data.decision?.tool ?? 'N/A'}`;
                    log.innerHTML += `\n[AI REASONING] "${data.decision?.thought ?? 'N/A'}"`;
                    if (data.execution_result !== undefined) {
                        log.innerHTML += `\n[RESULT] ${data.execution_result}`;
                    }

                    if (data.execution_result === "Awaiting admin approval") {
                        const logsRes = await fetch('/api/logs');
                        const logs = await logsRes.json();
                        if (logs.length > 0) {
                            lastKnownLogTime = logs[0].timestamp; 
                            lastKnownStatus = "Pending Approval";
                            pollInterval = setInterval(watchForUpdates, 500);
                        }
                    }
                }
                log.scrollTop = log.scrollHeight;
                
            } catch (err) {
                log.innerHTML += `\n[FATAL] Connection Failed: ${err}`;
            }
        }

        async function watchForUpdates() {
            const log = document.getElementById('console-log');
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                
                if (logs.length === 0) return;

                const topLog = logs[0];

                if (topLog.timestamp === lastKnownLogTime && topLog.status === 'Rejected' && !retryMessagePrinted) {
                    log.innerHTML += `<br> <span style="color:#ffff55;">> Model retrying...</span>`; 
                    retryMessagePrinted = true;
                    lastKnownStatus = 'Rejected';
                    log.scrollTop = log.scrollHeight;
                }

                else if (topLog.timestamp !== lastKnownLogTime) {
                    
                    if (logs.length > 1 && logs[1].status === 'Rejected' && !retryMessagePrinted) {
                        log.innerHTML += `<br> <span style="color:#ffff55;">> Model retrying...</span>`;
                        retryMessagePrinted = true;
                    }

                    log.innerHTML += `\n[AI RETRY] Tool: ${topLog.action}`;
                    log.innerHTML += `\n[AI REASONING] "${topLog.thought}"`;
                    log.innerHTML += `\n[RESULT] ${topLog.status === 'Executed' ? 'Executed successfully' : 'Awaiting admin approval'}`;
                    log.scrollTop = log.scrollHeight;

                    lastKnownLogTime = topLog.timestamp;
                    lastKnownStatus = topLog.status;
                    retryMessagePrinted = false;

                    if (topLog.status === 'Executed') {
                        clearInterval(pollInterval);
                    }
                }

                else if (topLog.status === 'Executed' && topLog.timestamp === lastKnownLogTime && lastKnownStatus === 'Pending Approval') {
                    log.innerHTML += `<br> <span style="color:#00ff00;">> Admin Approved. Action Executed.</span>`;
                    log.scrollTop = log.scrollHeight;
                    clearInterval(pollInterval);
                }

            } catch (e) {
                console.error("Polling error", e);
            }
        }

        let autoSim = false;
        const autoBtn = document.getElementById('autoSimBtn');
        const autoStatus = document.getElementById('autoSimStatus');
        const consoleLog = document.getElementById('console-log');

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        autoBtn.addEventListener('click', () => {
            autoSim = !autoSim;
            if (autoSim) {
            autoBtn.textContent = 'Stop Auto-Simulate';
            autoStatus.textContent = 'Running';
            startAutoSimulate();
            } else {
            autoBtn.textContent = 'Start Auto-Simulate';
            autoStatus.textContent = 'Stopping...';
            }
        });

        async function getProblemsAndActive() {
            const [pRes, aRes] = await Promise.all([fetch('/api/problems'), fetch('/api/active_problems')]);
            const problems = await pRes.json();
            const active = await aRes.json();
            return { problems, active };
        }

        function pickRandomProblem(problems, activeList) {
            const ids = Object.keys(problems || {});
            const candidates = ids.filter(id => !activeList.includes(id));
            const pool = candidates.length ? candidates : ids;
            if (!pool.length) return null;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        async function waitForResolution(problemId, pollInterval = 800) {
            while (autoSim) {
            try {
                const res = await fetch('/api/active_problems');
                const active = await res.json();
                if (!active.includes(problemId)) {
                return true;
                }
            } catch (e) {
                console.error("active_problems fetch failed", e);
            }
            await sleep(pollInterval);
            }
            return false
        }

        async function startAutoSimulate() {
            if (!autoSim) return;
            const log = consoleLog;

            log.innerHTML += `<br><br><span style="color:#00ff88;">> Auto-simulate started</span>`;
            log.scrollTop = log.scrollHeight;

            while (autoSim) {
            try {
                const { problems, active } = await getProblemsAndActive();

                const problemId = pickRandomProblem(problems, active);
                if (!problemId) {
                log.innerHTML += `<br><span>[AUTO] No problems available to inject</span>`;
                await sleep(1000);
                continue;
                }

                const problemName = problems[problemId]?.name ?? problemId;
                log.innerHTML += `<br><br><span style="color:#ff5555; font-weight:bold;">> [AUTO] Injecting fault: ${problemName} (${problemId})</span>`;
                log.scrollTop = log.scrollHeight;

                const triggerRes = await fetch('/api/trigger_scenario', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({problem: problemId})
                });
                const triggerData = await triggerRes.json();

                if (triggerData.error) {
                log.innerHTML += `<br>[AUTO ERROR] ${triggerData.error}`;
                log.scrollTop = log.scrollHeight;
                await sleep(800);
                continue;
                } else {
                const decisionTool = triggerData.decision?.tool ?? 'N/A';
                const decisionThought = triggerData.decision?.thought ?? '';
                const executionResult = triggerData.execution_result ?? '';

                log.innerHTML += `<br>[AUTO DECISION] Tool: ${decisionTool}`;
                log.innerHTML += `<br>[AUTO REASON] "${decisionThought}"`;
                log.innerHTML += `<br>[AUTO RESULT] ${executionResult}`;
                log.scrollTop = log.scrollHeight;
                }

                const resolved = await waitForResolution(problemId);

                if (!autoSim) {
                log.innerHTML += `<br><span style="color:#ffaa00;">> Auto-simulate stopped by user</span>`;
                autoStatus.textContent = 'Idle';
                break;
                }

                if (resolved) {
                log.innerHTML += `<br><span style="color:#00ff00;">> [AUTO] Problem resolved: ${problemName} (${problemId})</span>`;
                } else {
                log.innerHTML += `<br><span style="color:#ff4444;">> [AUTO] Stopped waiting for resolution of ${problemId}</span>`;
                }
                log.scrollTop = log.scrollHeight;

                await sleep(700);
            } catch (e) {
                console.error("Auto-simulate loop error", e);
                log.innerHTML += `<br>[AUTO EXCEPTION] ${e}`;
                log.scrollTop = log.scrollHeight;
                await sleep(1200);
            }
            }

            autoStatus.textContent = 'Idle';
            autoBtn.textContent = 'Start Auto-Simulate';
            log.innerHTML += `<br><span style="color:#00ff88;">> Auto-simulate ended</span>`;
            log.scrollTop = log.scrollHeight;
        }
        
        loadProblems();
    </script>
</body>
</html>
