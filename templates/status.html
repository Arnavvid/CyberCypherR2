<!DOCTYPE html>
<html>
<head>
    <title>Network Status</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', monospace; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        
        h2 { margin-top: 0; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .health-container { width: 100%; background-color: #333; border-radius: 4px; overflow: hidden; margin-top: 10px;}
        .health-bar {  height: 30px; width: 100%; background-color: #00ff00; transition: all 0.5s; text-align: center; line-height: 30px; color: black; font-weight: bold; font-size: 14px;}

        .badge { padding: 5px 15px; border-radius: 4px; font-weight: bold; display: inline-block; font-size: 14px; }
        .badge-green { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; }
        .badge-red { background: rgba(255, 0, 64, 0.1); color: #ff0040; border: 1px solid #ff0040; box-shadow: 0 0 10px #ff0040;}
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1 style="border-bottom: 1px solid #333; padding-bottom: 10px;">NETWORK STATUS OBSERVER</h1>
    
    <div class="grid">
        <div class="card">
            <h2>Latency (ms)</h2>
            <canvas id="latencyChart"></canvas>
        </div>
        <div class="card">
            <h2>Packet Loss (%)</h2>
            <canvas id="lossChart"></canvas>
        </div>
        <div class="card">
            <h2>Throughput (Mbps)</h2>
            <canvas id="throughputChart"></canvas>
        </div>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <div class="card">
            <h2>Device Health Integrity</h2>
            <div class="health-container">
                <div id="healthBar" class="health-bar" style="width: 100%;">100%</div>
            </div>
        </div>

        <div class="card" style="grid-template-columns: 1fr 1fr;">
            <h2>Routing Status</h2>
            <div id="routingBadge" class="badge badge-green" style="width: 96.5%;">STABLE</div>
        </div>
    </div>

    <script>
        const MAX_DATA_POINTS = 20;

        const commonOptions = { 
            animation: false, 
            responsive: true,
            scales: { 
                x: { 
                    display: true, 
                    ticks: { color: '#666', maxTicksLimit: 10 }
                }, 
                y: { 
                    grid: { color: '#333' },
                    ticks: { color: '#888' }
                } 
            },
            elements: { point: { radius: 0 } },
            plugins: { legend: { display: false } }
        };

        const mkChart = (id, label, color, max) => new Chart(document.getElementById(id), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    label: label, 
                    data: [], 
                    borderColor: color, 
                    borderWidth: 2, 
                    fill: true, 
                    backgroundColor: color + '20' 
                }] 
            },
            options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, suggestedMax: max } } }
        });

        const charts = {
            latency: mkChart('latencyChart', 'Latency', '#00d2ff', 100),
            loss: mkChart('lossChart', 'Loss', '#ff00ff', 5),
            throughput: mkChart('throughputChart', 'Mbps', '#f1c40f', 1000)
        };

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const now = new Date().toLocaleTimeString('en-US', { hour12: false });

                updateGraph(charts.latency, now, data.latency, 50, '#ff0040', '#00d2ff');
                updateGraph(charts.loss, now, data.packet_loss, 2, '#ff0040', '#ff00ff');
                updateGraph(charts.throughput, now, data.throughput, 5000, '#ff0040', '#f1c40f');

                const hb = document.getElementById('healthBar');
                if(data.device_health === "Critical") { 
                    hb.style.width = "25%"; hb.style.backgroundColor = "#ff0040"; hb.innerText = "CRITICAL FAILURE"; 
                } else { 
                    hb.style.width = "100%"; hb.style.backgroundColor = "#00ff00"; hb.innerText = "SYSTEM OPTIMAL"; 
                }

                const rb = document.getElementById('routingBadge');
                rb.className = (data.routing_status === "Stable") ? "badge badge-green" : "badge badge-red";
                rb.innerText = data.routing_status.toUpperCase();
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function updateGraph(chart, label, value, threshold, badColor, goodColor) {
            const labels = chart.data.labels;
            const dataPoints = chart.data.datasets[0].data;

            labels.push(label);
            dataPoints.push(value);

            if (labels.length > MAX_DATA_POINTS) {
                labels.shift();
                dataPoints.shift();
            }

            chart.data.datasets[0].borderColor = (value > threshold) ? badColor : goodColor;
            
            chart.update();
        }

        setInterval(updateStatus, 500);
    </script>
</body>
</html>
